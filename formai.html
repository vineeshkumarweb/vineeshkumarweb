<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .form-container h2 {
      margin-bottom: 10px;
    }

    .form-container p {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .input-group label {
      font-size: 13px;
      color: #333;
      display: block;
      margin-bottom: 5px;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .signin-btn {
      width: 100%;
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .signin-btn:hover {
      background: #4338ca;
    }

    .extra-links {
      margin-top: 15px;
      font-size: 13px;
    }

    .extra-links a {
      color: #4f46e5;
      text-decoration: none;
      margin: 0 5px;
    }
  </style>
  </head>

  <body>

    <div class="form-container">
      <h2>Sign In</h2>
      <p>Access your account</p>

      <form>
        <div class="input-group">
          <label>Email or phone</label>
          <input type="email" placeholder="Enter your email or phone" required>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="signin-btn">Sign In</button>
      </form>

      <div class="extra-links">
        <a href="#">Forgot Password? <iframe src="fgtpass.html" frameborder="0" style="width:400px;"></iframe>|</a>

        <a href="#">Create Account</a>
      </div>
    </div>

  </body>

</html>

</html>
